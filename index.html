<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1Anki CSV Builder (JP-EN) — Mobile & Desktop</title>
<style>
  :root { --pad: 16px; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", Arial, sans-serif; margin: var(--pad); }
  h1 { font-size: 22px; margin: 0 0 8px; }
  .hint { color:#555; font-size:14px; margin-bottom: 12px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin: 8px 0; }
  .btn { padding:12px 16px; border:1px solid #ccc; border-radius:10px; background:#f4f4f6; cursor:pointer; font-size:16px; }
  .btn.primary { background:#0b5fff; border-color:#0b5fff; color:#fff; }
  .btn:active { transform: translateY(1px); }
  textarea { width:100%; height:50vh; padding:12px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size:15px; line-height:1.5; border:1px solid #ddd; border-radius:10px; }
  label { font-size:15px; }
  .status { margin-top:8px; font-size:14px; color:#444; }
  table { width:100%; border-collapse: collapse; margin-top:10px; font-size:14px; }
  th, td { border:1px solid #eee; padding:8px; vertical-align: top; }
  th { background:#fafafa; text-align:left; }
  td { white-space: pre-wrap; } /* để preview thấy xuống dòng */
  @media (min-width: 900px){
    textarea{ height: 45vh; }
  }
</style>
</head>

<body>
  <h1>Anki CSV Builder (JP-EN)</h1>
  <div class="hint">
    Xuất CSV <b>không header</b>. Mapping hiện tại của bạn đang là <b>7 cột</b>:<br>
    <code>1) JP | 2) Analysis | 3) Key phrase | 4) (trống) | 5) Image | 6) (trống) | 7) EN</code><br>
    Dán dữ liệu → Preview → Tải CSV → Import trong Anki và map theo đúng thứ tự cột.111
  </div>

  <div class="row">
    <button class="btn" id="btnExample">Dán ví dụ</button>
    <button class="btn primary" id="btnDownload">Tải CSV</button>
    <label><input type="checkbox" id="chkDedup" checked> Loại trùng theo JP (cột 1)</label>
  </div>

  <textarea id="input" placeholder="[日本語文]
すみません、この料理はもう少し辛くできますか？

[英語文]
Excuse me, can you make this dish a bit spicier?

📌 キーフレーズ: [Excuse me]::すみません,[a bit spicier]::もう少し辛く
🖼 画像キーワード: restaurant waiter spicy dish"></textarea>

  <div class="row">
    <button class="btn" id="btnPreview">Preview</button>
    <span class="status" id="status">Số thẻ hợp lệ: 0</span>
  </div>

  <div id="preview"></div>

<script>
function normalize(text){
  return (text||"").trim().replace(/\r\n/g,"\n").replace(/\r/g,"\n");
}

// Bắt section [日本語文] / [英語文] dạng nhiều dòng
function pickSection(part, label){
  const re = new RegExp(
    "\\[" + label + "\\]\\s*([\\s\\S]*?)(?=\\n\\[(?:日本語文|英語文)\\]|\\n🔎|\\n📌|\\n🖼|$)"
  );
  const m = part.match(re);
  return m ? m[1].trim() : "";
}

// Bắt nội dung sau emoji (🔎/📌/🖼) dạng nhiều dòng
function pickLineOrMulti(part, emoji){
  const re = new RegExp(
    emoji + "\\s*[^:：\\n]*\\s*[:：]?\\s*([\\s\\S]*?)(?=\\n\\[(?:日本語文|英語文)\\]|\\n🔎|\\n📌|\\n🖼|$)"
  );
  const m = part.match(re);
  return m ? m[1].trim() : "";
}

function parseBlocks(text){
  const t = normalize(text);
  if(!t) return [];

  const parts = t.split(/\n(?=\[日本語文\])/);
  const rows = [];

  for(const part of parts){
    const jp  = pickSection(part, "日本語文");
    const en  = pickSection(part, "英語文");
    const an  = pickLineOrMulti(part, "🔎");
    const key = pickLineOrMulti(part, "📌");
    const img = pickLineOrMulti(part, "🖼");

    if(jp){
      // 7 cột: JP | Analysis | Key | empty | Image | empty | EN
      rows.push([jp, an, key, "", img, "", en]);
    }
  }
  return rows;
}

function toCSVNoHeader(rows){
  const escape = (v) => {
    const s = String(v ?? "");
    const need = /[",\n]/.test(s);
    const e = s.replace(/"/g, '""');
    return need ? `"${e}"` : e;
  };
  return rows.map(r => r.map(escape).join(",")).join("\n");
}

function setStatus(msg){ document.getElementById("status").textContent = msg; }

function escapeHTML(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function renderPreview(rows){
  const el = document.getElementById("preview");
  if(rows.length===0){ el.innerHTML=""; return; }

  const head = `
    <tr>
      <th>JP (1)</th>
      <th>Analysis (2)</th>
      <th>Key phrase (3)</th>
      <th>Empty (4)</th>
      <th>Image (5)</th>
      <th>Empty (6)</th>
      <th>EN (7)</th>
    </tr>`;

  const body = rows.slice(0,10).map(r=>{
    return `<tr>${
      r.map(c=>`<td>${escapeHTML(c)}</td>`).join("")
    }</tr>`;
  }).join("");

  el.innerHTML = `<table>${head}${body}</table>
    <div class="status">Hiển thị tối đa 10 thẻ xem trước • Tổng: ${rows.length}</div>`;
}

function downloadCSV(filename, csvText){
  const blob = new Blob(["\uFEFF"+csvText], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}

const EXAMPLE = `[日本語文]
すみません、この料理はもう少し辛くできますか？
（※追加の一文：おすすめもありますか？）

[英語文]
Excuse me, can you make this dish a bit spicier?
(Also, do you have any recommendations?)

📌 キーフレーズ:
[Excuse me]::すみません
[a bit spicier]::もう少し辛く
[recommendations]::おすすめ

🖼 画像キーワード: restaurant waiter spicy dish

[日本語文]
明日のテストのために、
この問題を一緒に解きませんか？

[英語文]
Shall we solve this problem together
for tomorrow's test?

📌 キーフレーズ: [Shall we ~ ?]::一緒に〜しませんか？
🖼 画像キーワード: school desk students textbook`;

const $input = document.getElementById("input");
const $chk = document.getElementById("chkDedup");

function currentRows(){
  let rows = parseBlocks($input.value);
  if($chk.checked){
    const seen = new Set();
    rows = rows.filter(r=>{
      const key = r[0]; // dedup theo JP
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }
  return rows;
}

document.getElementById("btnExample").addEventListener("click", ()=>{
  $input.value = EXAMPLE;
  const rows = currentRows();
  setStatus(`Số thẻ hợp lệ: ${rows.length}`);
  renderPreview(rows);
});

document.getElementById("btnPreview").addEventListener("click", ()=>{
  const rows = currentRows();
  if(rows.length===0){
    alert("Chưa tìm thấy thẻ hợp lệ. Mỗi block cần có [日本語文] (JP).");
  }
  setStatus(`Số thẻ hợp lệ: ${rows.length}`);
  renderPreview(rows);
});

document.getElementById("btnDownload").addEventListener("click", ()=>{
  const rows = currentRows();
  if(rows.length===0){
    alert("Không có thẻ hợp lệ để xuất.");
    return;
  }
  const csv = toCSVNoHeader(rows);
  downloadCSV("anki_cards.csv", csv);
});

$input.addEventListener("input", ()=>{
  const rows = currentRows();
  setStatus(`Số thẻ hợp lệ: ${rows.length}`);
});
</script>

</body>
</html>
